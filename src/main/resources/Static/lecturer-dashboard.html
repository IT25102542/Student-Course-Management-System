<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard - Coursera</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .course-item { transition: all 0.2s ease; cursor: pointer; }
        .course-item:hover { background-color: #f3f4f6; }
        .course-item.selected { background-color: #f5f0ff; border-left: 4px solid #5624d0; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #2D2F31; color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; animation: fadeInOut 3s ease-in-out; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-bold" style="color: #5624d0;">Coursera</span>
                <span class="text-xs bg-primary/10 text-primary px-2 py-1 rounded-full" style="color: #5624d0;">Lecturer</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="lecturerNameDisplay" class="text-gray-700 font-medium"></span>
                <button onclick="logout()" class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50">Logout</button>
            </div>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Profile Section -->
    <section class="bg-white border border-gray-100 rounded-xl shadow-sm p-6 mb-8">
        <div class="flex items-center gap-2 mb-4">
            <span class="material-symbols-outlined" style="color: #5624d0;">manage_accounts</span>
            <h2 class="text-lg font-bold text-gray-900">Profile</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="text" id="profileName" class="px-3 py-2 border rounded-lg" placeholder="Name">
            <input type="password" id="profilePassword" class="px-3 py-2 border rounded-lg" placeholder="New password">
            <button onclick="updateProfile()" class="px-4 py-2 text-white rounded-lg hover:opacity-90" style="background-color: #5624d0;">Update Profile</button>
        </div>
    </section>

    <!-- Main Content: Vertical Course List + Students Table (Side by Side) -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- LEFT: Vertical Course List -->
        <div class="lg:col-span-1">
            <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
                <div class="px-5 py-4 border-b border-gray-100">
                    <h2 class="font-bold text-gray-900">Assigned Courses</h2>
                    <p class="text-sm text-gray-500" id="courseCountText">0 courses</p>
                </div>
                <div id="coursesList" class="max-h-[calc(100vh-300px)] overflow-y-auto">
                    <div class="px-5 py-8 text-center text-gray-400">Loading courses...</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Enrolled Students Table -->
        <div class="lg:col-span-2">
            <div class="bg-white border border-gray-100 rounded-xl shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100">
                    <h2 class="text-lg font-bold text-gray-900">Enrolled Students</h2>
                    <p class="text-sm text-gray-500" id="selectedCourseTitle">Select a course to view students</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Student ID</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Phone</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500">Status</th>
                        </tr>
                        </thead>
                        <tbody id="studentsTable" class="divide-y divide-gray-100">
                        <tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">Select a course to view students</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const lecturerUser = JSON.parse(localStorage.getItem('lecturerUser') || 'null');
    let lecturerCourses = [];
    let selectedCourseId = null;

    function showToast(message, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.backgroundColor = isError ? '#dc2626' : '#2D2F31';
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    async function request(path, options = {}) {
        const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options });
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        if (!res.ok) throw new Error(data?.message || 'Request failed');
        return data;
    }

    function requireLogin() {
        if (!lecturerUser) {
            window.location.href = '/login.html';
            return false;
        }
        return true;
    }

    async function loadDashboard() {
        if (!requireLogin()) return;
        try {
            const dashboard = await request(`/api/lecturers/${lecturerUser.id}/dashboard`);
            lecturerCourses = dashboard.courses || [];
            document.getElementById('lecturerNameDisplay').textContent = dashboard.name;
            document.getElementById('profileName').value = dashboard.name;
            document.getElementById('courseCountText').innerText = `${lecturerCourses.length} course${lecturerCourses.length === 1 ? '' : 's'}`;
            renderCourseList();
        } catch (err) {
            document.getElementById('coursesList').innerHTML = `<div class="px-5 py-8 text-center text-red-500">${escapeHtml(err.message)}</div>`;
        }
    }

    function renderCourseList() {
        const container = document.getElementById('coursesList');
        if (lecturerCourses.length === 0) {
            container.innerHTML = '<div class="px-5 py-8 text-center text-gray-400">No courses assigned to you.</div>';
            return;
        }

        container.innerHTML = lecturerCourses.map(course => `
            <div class="course-item px-5 py-4 border-b border-gray-100 ${selectedCourseId === course.id ? 'selected' : ''}" onclick="selectCourse(${course.id})">
                <div class="text-xs font-semibold mb-1" style="color: #5624d0;">${escapeHtml(course.courseCode)}</div>
                <div class="font-semibold text-gray-900">${escapeHtml(course.title)}</div>
                <div class="text-xs text-gray-500 mt-1">${escapeHtml(course.duration || 'Flexible')} | ${course.enrolledCount}/${course.capacity} students</div>
            </div>
        `).join('');
    }

    async function selectCourse(courseId) {
        selectedCourseId = courseId;
        renderCourseList();

        // Find the full course data from the dashboard (includes students)
        const dashboard = await request(`/api/lecturers/${lecturerUser.id}/dashboard`);
        const course = dashboard.courses.find(c => c.id === courseId);

        if (!course) return;

        document.getElementById('selectedCourseTitle').innerHTML = `${escapeHtml(course.courseCode)} - ${escapeHtml(course.title)}`;

        const studentsTable = document.getElementById('studentsTable');

        if (!course.students || course.students.length === 0) {
            studentsTable.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400">No enrolled students yet</td></tr>';
        } else {
            studentsTable.innerHTML = course.students.map(student => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-3 font-mono text-sm">${escapeHtml(student.studentId)}</td>
                    <td class="px-6 py-3 font-medium">${escapeHtml(student.name)}</td>
                    <td class="px-6 py-3 text-sm">${escapeHtml(student.email)}</td>
                    <td class="px-6 py-3 text-sm">${escapeHtml(student.phoneNumber || '-')}</td>
                    <td class="px-6 py-3 text-sm"><span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">${escapeHtml(student.status)}</span></td>
                </tr>
            `).join('');
        }
    }

    async function updateProfile() {
        if (!requireLogin()) return;
        try {
            const payload = {
                name: document.getElementById('profileName').value,
                password: document.getElementById('profilePassword').value
            };
            if (!payload.password || payload.password === '') delete payload.password;
            const updated = await request(`/api/lecturers/${lecturerUser.id}/profile`, { method: 'PUT', body: JSON.stringify(payload) });
            lecturerUser.name = updated.name;
            localStorage.setItem('lecturerUser', JSON.stringify(lecturerUser));
            document.getElementById('profilePassword').value = '';
            showToast('Profile updated successfully');
            await loadDashboard();
        } catch (err) { showToast(err.message, true); }
    }

    function logout() {
        localStorage.removeItem('lecturerUser');
        window.location.href = '/login.html';
    }

    window.selectCourse = selectCourse;
    window.updateProfile = updateProfile;
    window.logout = logout;

    loadDashboard();
</script>
</body>
</html>
